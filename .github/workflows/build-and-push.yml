# Build backend and frontend images and push to GHCR.
# Optionally updates k8s manifests with the new image tag so ArgoCD can sync.
# Set repo variable REGISTRY_OWNER to override image org (default: repo owner).
name: Build and push images

on:
  push:
    branches:
      - main
    workflow_dispatch:
    paths-ignore:
      - '**.md'
      - 'k8s/**'
      - 'argocd/**'
      - '.github/workflows/build-and-push.yml'

env:
  REGISTRY: ghcr.io
  # Use repo variable REGISTRY_OWNER if set (e.g. jeammm), else GitHub repo owner
  REGISTRY_OWNER: ${{ vars.REGISTRY_OWNER || github.repository_owner }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      short_sha: ${{ steps.vars.outputs.short_sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize registry owner to lowercase
        run: echo "REGISTRY_OWNER=$(echo '${{ env.REGISTRY_OWNER }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set image tag
        id: vars
        run: |
          SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "Image tag will be $SHORT_SHA"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/archery-backend
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.vars.outputs.short_sha }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata for frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REGISTRY_OWNER }}/archery-frontend
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.vars.outputs.short_sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-manifests:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tags in k8s manifests
        env:
          SHORT_SHA: ${{ needs.build-and-push.outputs.short_sha }}
          REGISTRY_OWNER: ${{ vars.REGISTRY_OWNER || github.repository_owner }}
        run: |
          REGISTRY_OWNER_LC=$(echo "$REGISTRY_OWNER" | tr '[:upper:]' '[:lower:]')
          for f in k8s/backend-deployment.yaml k8s/frontend-deployment.yaml k8s/celery-deployment.yaml; do
            sed -i.bak "s|image: ghcr.io/[^/]*/archery-backend:[^\"' ]*|image: ghcr.io/${REGISTRY_OWNER_LC}/archery-backend:${SHORT_SHA}|g" "$f"
            sed -i.bak "s|image: ghcr.io/[^/]*/archery-frontend:[^\"' ]*|image: ghcr.io/${REGISTRY_OWNER_LC}/archery-frontend:${SHORT_SHA}|g" "$f"
            rm -f "${f}.bak"
          done

      - name: Commit and push manifest updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/backend-deployment.yaml k8s/frontend-deployment.yaml k8s/celery-deployment.yaml
          git diff --staged --quiet || git commit -m "chore(k8s): update image tags to ${{ needs.build-and-push.outputs.short_sha }}"
          git push
