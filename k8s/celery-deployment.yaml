apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-worker
  template:
    metadata:
      labels:
        app: celery-worker
    spec:
      containers:
        - name: celery
          image: ghcr.io/Jeammm/archery-backend:e649540
          command:
            - celery
            - -A
            - run.celery
            - worker
            - --loglevel=info
          env:
            - name: FLASK_APP
              value: "run"
            - name: FLASK_DEBUG
              value: "0"
            - name: REDIS_URL
              value: "redis://redis:6379/0"
