apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: archery-tracker
  namespace: archery-tracker
spec:
  ingressClassName: cloudflare-tunnel
  rules:
    - host: archery.jeammm.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 5000
          - path: /socket.io
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 5000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
